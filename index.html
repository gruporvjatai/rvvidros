<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disparador Automático</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; margin: 0 auto;}
        input, textarea, button { width: 100%; margin-bottom: 10px; padding: 10px; box-sizing: border-box;}
        button { background-color: #28a745; color: white; border: none; cursor: pointer; font-weight: bold;}
    </style>
</head>
<body>

    <h2>Enviar Mensagem</h2>
    <input type="text" id="telefone" placeholder="Telefone (Ex: 5511999999999)">
    <textarea id="mensagem" rows="4" placeholder="Digite a mensagem aqui..."></textarea>
    <button onclick="enviarDados()" id="btnEnviar">Disparar</button>

    <p id="status"></p>

    <script>
        // A sua URL do Google Apps Script
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwYGFwAIuDCfQFVCgz-XAFAvxNAxVfL7eRNR8p-uXv2iG7kUxSVWYFuKPjisTu98sb9wA/exec';

        async function enviarDados() {
            const telefone = document.getElementById('telefone').value;
            const mensagem = document.getElementById('mensagem').value;
            const statusTexto = document.getElementById('status');
            const btn = document.getElementById('btnEnviar');

            if(!telefone || !mensagem) {
                alert("Preencha todos os campos!");
                return;
            }

            statusTexto.innerText = "Enviando...";
            btn.disabled = true;

            try {
                // Dispara os dados para o Google Script
                const resposta = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ telefone: telefone, mensagem: mensagem })
                });

                const resultado = await resposta.json();

                if(resultado.sucesso) {
                    statusTexto.innerText = "✅ " + resultado.msg;
                    document.getElementById('mensagem').value = ""; // Limpa o campo
                } else {
                    statusTexto.innerText = "❌ Erro: " + resultado.erro;
                }
            } catch (erro) {
                statusTexto.innerText = "❌ Falha na conexão (Verifique o console ou o CORS no Script).";
                console.error(erro);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
