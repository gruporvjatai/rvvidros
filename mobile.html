<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="shortcut icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="application-name" content="RV Blocos">
  <meta name="apple-mobile-web-app-title" content="RV Blocos">
  <meta name="theme-color" content="#0f172a"> <link rel="manifest" href="manifest.json">
  
  <style>
    /* Reset e travas de layout */
    html, body { 
      max-width: 100%; overflow-x: hidden; 
      background-color: #f1f5f9; font-family: 'Inter', sans-serif; 
      -webkit-tap-highlight-color: transparent; margin: 0; padding: 0;
    }
    
    /* CORES MARCANTES RV */
    .bg-rv-dark { background-color: #0f172a; } /* Slate 900 */
    .text-rv-orange { color: #ea580c; } /* Orange 600 */
    .border-rv-orange { border-color: #ea580c; }
    
    .active-tab { color: #ea580c !important; border-top: 3px solid #ea580c; background-color: rgba(234, 88, 12, 0.05); }
    .hidden { display: none; }
    
    /* --- O SEGREDO ESTÁ AQUI NO CSS DE IMPRESSÃO --- */
      #print-area { display: none; }

      @media print {
        /* 1. DESTRAVA AS LIMITAÇÕES DO MOBILE PARA O A4 RESPIRAR */
        html, body { 
            max-width: none !important; 
            overflow: visible !important; 
            width: auto !important; 
            height: auto !important; 
        }

        /* 2. ESCONDE O APP E MOSTRA A ÁREA DE IMPRESSÃO */
        nav, header, main, button, .no-print { display: none !important; }
        #print-area { display: block !important; }

        /* 3. CÓPIA EXATA E INTOCADA DO INDEX.HTML A PARTIR DAQUI */
        @page { size: A4; margin: 10mm; }
        body { background: white; margin: 0; padding: 0; font-family: 'Helvetica', 'Arial', sans-serif; color: #1e293b; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        /* CAIXA PRINCIPAL DO ORÇAMENTO ESTICADA */
        .invoice-full { 
            border: 1px solid #cbd5e1; 
            position: relative; 
            z-index: 1;
            /* Estica a borda até o final da folha A4 */
            min-height: 27.5cm; 
            background-color: transparent;
        }

        /* O SEGREDO DO TIMBRADO (MARCA D'ÁGUA) DESLOCADO PARA BAIXO */
        .invoice-full::before {
            content: "";
            position: absolute;
            /* Empurra a logo mais para baixo (antes estava no meio, 50%) */
            top: 57%; 
            left: 50%;
            transform: translate(-50%, -50%);
            /* Aumentei um pouquinho o tamanho pra preencher melhor o espaço */
            width: 450px; 
            height: 450px;
            background-image: url('https://lh3.googleusercontent.com/d/1SIoZ2JlalfMnGDZTXBk7ZYuPgwxX3odF');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.1;
            z-index: -1; 
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        .header-section { 
        display: flex; 
        align-items: center; /* Centraliza verticalmente */
        border-bottom: 2px solid #0f172a; 
        padding-bottom: 15px; 
        margin-bottom: 20px;}
        
        .logo-area {display: flex; align-items: center; justify-content: center;}
         

        .company-details { flex: 1; margin-left: 20px;padding-right: 20px; }
        .company-title { font-size: 20px; font-weight: 800; color: #ea580c; text-transform: uppercase; margin: 0; }
        .company-info { font-size: 11px; color: #475569; line-height: 1.4; margin-top: 5px; }
        .doc-meta { width: 180px; text-align: right; flex-shrink: 0; margin-right: 20px;}

        .doc-title { font-size: 16px; font-weight: 900; color: #0f172a; text-transform: uppercase; margin-bottom: 5px;}
        .meta-row { font-size: 11px; margin-bottom: 2px; }

        .info-grid { display: flex; gap: 20px; margin-bottom: 20px; }
        .info-col { flex: 1; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; }
        .col-header { background-color: #f1f5f9; padding: 5px 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; color: #64748b; border-bottom: 1px solid #e2e8f0; }
        .col-content { padding: 10px; font-size: 11px; line-height: 1.5; }

        .full-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 20px; }
        .full-table th { background-color: #0f172a; color: white; padding: 8px; text-align: left; font-weight: bold; text-transform: uppercase; font-size: 10px; }
        .full-table td { border-bottom: 1px solid #e2e8f0; padding: 8px; vertical-align: middle; }
        .full-table tr:nth-child(even) { background-color: #f8fafc; }

        .footer-section { display: flex; gap: 30px; margin-top: 10px; }
        .notes-area { flex: 1; border: 1px dashed #cbd5e1; padding: 10px; border-radius: 6px; }
        .notes-title { font-size: 10px; font-weight: bold; margin-bottom: 5px; color: #64748b; }
        .notes-text { font-size: 10px; color: #334155; }
        
        .totals-area { width: 250px; }
        .total-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 11px; border-bottom: 1px solid #e2e8f0; }
        .total-row.final { border-bottom: none; border-top: 2px solid #0f172a; font-size: 14px; font-weight: 900; margin-top: 5px; padding-top: 10px; background-color: #f1f5f9; padding: 10px; }
      }

    input, select, button { height: 50px; border-radius: 14px !important; }
    .loader { border: 2px solid #fff; border-top: 2px solid #ea580c; border-radius: 50%; width: 22px; height: 22px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header class="h-20 bg-rv-dark shadow-2xl sticky top-0 z-40 flex items-center justify-between px-5 border-b-4 border-rv-orange">
    <div class="flex items-center gap-3">
      <div class="w-14 h-14 rounded-2xl border-2 border-rv-orange overflow-hidden bg-white p-1 flex items-center justify-center">
        <img src="https://lh3.googleusercontent.com/d/1SIoZ2JlalfMnGDZTXBk7ZYuPgwxX3odF" class="max-w-full max-h-full object-contain">
      </div>
      <div>
        <h1 class="font-black text-lg italic text-white leading-none tracking-tighter">RV BLOCOS</h1>
        <p class="text-[10px] font-black text-rv-orange uppercase tracking-widest mt-1">E ESTRUTURAS</p>
      </div>
    </div>
    <div id="main-loader" class="hidden"><div class="loader"></div></div>
  </header>

  <main id="content" class="p-4 pb-28">
    
    <section id="view-estoque" class="space-y-4">
      <div class="flex justify-between items-center px-1">
        <h2 class="font-bold text-slate-500 uppercase text-[10px] tracking-widest">Saldo do Pátio</h2>
        <button onclick="loadData()" class="text-rv-orange text-xs font-black uppercase">Atualizar 🔄</button>
      </div>
      <div id="lista-estoque" class="space-y-3"></div>
    </section>

    <section id="view-vendas" class="hidden space-y-4">
      <div class="flex justify-between items-center px-1">
        <h2 class="font-bold text-slate-500 uppercase text-[10px] tracking-widest">Painel de Orçamentos</h2>
        <button onclick="loadData()" class="text-rv-orange text-xs font-black uppercase">Atualizar 🔄</button>
      </div>
      <div id="lista-orcamentos" class="space-y-3"></div>
      
      <button onclick="abrirFormOrcamento()" class="fixed bottom-24 right-6 w-16 h-16 bg-rv-dark text-rv-orange rounded-full shadow-2xl text-4xl flex items-center justify-center z-50 transition-transform active:scale-90 border-2 border-rv-orange">+</button>
    </section>

    <section id="view-producao" class="hidden">
      <div class="bg-rv-dark p-6 rounded-3xl text-white shadow-xl mb-6 border-b-4 border-rv-orange">
        <h2 class="font-black text-xl uppercase italic text-rv-orange">Entrada de Produção</h2>
        <p class="text-slate-400 text-[10px] font-bold mt-1 tracking-widest">ATUALIZAÇÃO DE ESTOQUE FÍSICO</p>
      </div>
      <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-5">
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Produto</label>
          <select id="prod-select" class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-slate-800 outline-none"></select>
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Quantidade</label>
          <input type="number" id="prod-qty" placeholder="0" class="w-full p-3 border-2 border-slate-100 rounded-xl text-3xl font-black text-center bg-slate-50 text-blue-600">
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Notas / Observações</label>
          <input type="text" id="prod-note" placeholder="Ex: Turno B" class="w-full p-3 border-2 border-slate-100 rounded-xl bg-slate-50">
        </div>
        <button onclick="salvarProducao()" class="w-full bg-rv-dark text-rv-orange font-black rounded-xl shadow-lg uppercase border-2 border-rv-orange">Lançar Estoque</button>
      </div>
    </section>

    <section id="view-registros" class="hidden space-y-4">
      <div class="flex justify-between items-center px-1">
        <h2 class="font-bold text-slate-500 uppercase text-[10px] tracking-widest">Histórico de Fabricação</h2>
        <button onclick="loadData()" class="text-rv-orange text-xs font-black uppercase">Atualizar🔄</button>
      </div>

      <div class="bg-rv-dark p-5 rounded-3xl text-white shadow-xl border-b-4 border-rv-orange flex justify-between items-center">
         <div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Produção Mensal</p>
            <div class="flex items-end gap-3 mt-1">
                <p id="dash-mes" class="text-4xl font-black text-white leading-none">0</p>
                <div class="flex flex-col pb-1">
                    <span class="text-[8px] text-slate-500 uppercase font-bold tracking-widest">Custo Un.</span>
                    <span id="dash-custo-un" class="text-sm font-black text-rv-orange">R$ 0,00</span>
                </div>
            </div>
         </div>
         <div>
            <input type="month" id="dash-month-filter" onchange="renderDashRegistros()" class="bg-slate-800 text-rv-orange border-2 border-slate-700 p-2 rounded-xl text-sm outline-none font-bold focus:border-rv-orange text-center w-32" title="Filtrar por Mês">
         </div>
      </div>

      <div class="bg-white p-3 rounded-2xl border flex gap-2 items-center shadow-sm">
         <input type="date" id="reg-start" class="flex-1 p-2 text-xs border rounded-xl outline-none font-bold text-slate-600" onchange="renderListaRegistros()">
         <span class="text-slate-400 text-[10px] font-bold uppercase">Até</span>
         <input type="date" id="reg-end" class="flex-1 p-2 text-xs border rounded-xl outline-none font-bold text-slate-600" onchange="renderListaRegistros()">
         <button onclick="limparFiltrosRegistros()" class="w-10 h-10 bg-slate-100 rounded-xl text-xs font-black text-slate-500">X</button>
      </div>

      <div id="lista-registros" class="space-y-3"></div>
    </section>

    <div id="modal-orcamento" class="fixed inset-0 bg-white z-[60] hidden flex flex-col p-4 overflow-y-auto">
      <div class="flex justify-between items-center mb-6">
        <button onclick="fecharFormOrcamento()" class="text-slate-400 font-bold uppercase text-[10px]">Sair</button>
        <h3 id="modal-title" class="font-black text-slate-800 uppercase italic">Orçamento</h3>
        <button onclick="enviarOrcamento()" class="text-rv-orange font-black uppercase text-[10px]">Salvar</button>
      </div>
      
      <div class="space-y-4">
        <select id="orc-cliente" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-slate-700"></select>
        
        <div class="bg-orange-50 p-5 rounded-3xl border-2 border-rv-orange/20 space-y-4">
          <select id="orc-produto" onchange="setarPrecoPadrao(this.value)" class="w-full p-3 border rounded-xl font-bold text-slate-700"></select>
          <div class="grid grid-cols-3 gap-2">
            <input type="number" id="orc-qtd" placeholder="Qtd" class="p-3 border rounded-xl text-center font-black text-lg bg-white">
            <input type="number" id="orc-preco" placeholder="R$" class="p-3 border rounded-xl font-black text-center text-lg bg-white">
            <button onclick="addItemCarrinho()" class="bg-rv-dark text-rv-orange rounded-xl font-black uppercase text-[10px]">Add</button>
          </div>
        </div>

        <div id="carrinho-itens" class="space-y-2"></div>
        
        <div class="mt-auto border-t pt-4 space-y-4">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Pagamento</label>
              <select id="orc-pagamento" class="w-full p-3 bg-slate-50 border rounded-xl font-bold text-xs">
                <option>Dinheiro</option><option>PIX</option><option>Cartão Crédito</option><option>Cartão Débito</option>
              </select>
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Desconto</label>
              <div class="flex border rounded-xl overflow-hidden bg-slate-50">
                <select id="orc-desc-tipo" onchange="renderCarrinho()" class="bg-slate-200 px-2 font-bold text-xs"><option>%</option><option>R$</option></select>
                <input type="number" id="orc-desc-val" value="0" onchange="renderCarrinho()" class="w-full p-2 text-center outline-none bg-transparent font-black">
              </div>
            </div>
          </div>
          
          <div class="bg-rv-dark p-5 rounded-3xl flex justify-between items-center shadow-xl border-b-4 border-rv-orange">
            <span class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Total a Pagar</span>
            <span id="orc-total-final" class="text-2xl font-black text-rv-orange">R$ 0,00</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="print-area"></div>

  <nav class="fixed bottom-0 left-0 right-0 h-18 bg-rv-dark border-t border-slate-800 flex justify-around items-center z-50 pb-2">
    <button onclick="showTab('estoque')" id="btn-estoque" class="flex flex-col items-center p-3 active-tab flex-1 text-slate-400 border-r border-slate-800">
      <span class="text-[10px] font-black uppercase tracking-tighter">Estoque</span>
    </button>
    <button onclick="showTab('vendas')" id="btn-vendas" class="flex flex-col items-center p-3 flex-1 text-slate-400 border-r border-slate-800">
      <span class="text-[10px] font-black uppercase tracking-tighter">Orçamentos</span>
    </button>
    <button onclick="showTab('producao')" id="btn-producao" class="flex flex-col items-center p-3 flex-1 text-slate-400 border-r border-slate-800">
      <span class="text-[10px] font-black uppercase tracking-tighter">Produção</span>
    </button>
    <button onclick="showTab('registros')" id="btn-registros" class="flex flex-col items-center p-3 flex-1 text-slate-400">
      <span class="text-[10px] font-black uppercase tracking-tighter">Registros</span>
    </button>
  </nav>

  <script>
    // --- CREDENCIAIS DO SUPABASE ---
    const supabaseUrl = 'https://irbgmmoxiedhcbfkanmu.supabase.co';
    const supabaseKey = 'sb_publishable_bhGr9DvGGg-gYWXsd_rf3w_CAZdF7n9';
    const sb = supabase.createClient(supabaseUrl, supabaseKey);

    let STATE = { products: [], clients: [], quotes: [], logs: [], custoMaterialB10: 0 };
    let CART = [];
    let CURRENT_QUOTE_ID = null;

    window.onload = () => loadData();

    function getNextId(array) {
        let max = 0;
        array.forEach(item => { const val = parseInt(item.id); if(!isNaN(val) && val > max) max = val; });
        return max + 1;
    }

    // --- NOVA LÓGICA DE CARREGAMENTO (SUPABASE) ---
    async function loadData() {
      const loader = document.getElementById('main-loader');
      if(loader) loader.classList.remove('hidden');

      try {
        const [resProd, resCli, resLog, resOrc, resConf] = await Promise.all([
            sb.from('produtos').select('*'),
            sb.from('clientes').select('*'),
            sb.from('logs').select('*'),
            sb.from('orcamentos').select('*'),
            sb.from('configuracoes').select('*').eq('chave', 'custo_material_b10').maybeSingle()
        ]);

        if (resProd.error) throw resProd.error;

        STATE.products = (resProd.data || []).map(p => ({
            id: p.id, name: p.nome, category: p.categoria, price: Number(p.preco),
            stock: Number(p.estoque_fisico), committed: Number(p.estoque_comprometido),
            available: Number(p.estoque_fisico) - Number(p.estoque_comprometido)
        }));

        STATE.clients = (resCli.data || []).map(c => ({
            id: c.id, name: c.nome, phone: c.telefone, doc: c.documento, address: c.endereco
        }));

        STATE.logs = (resLog.data || []).map(l => ({
            uid: l.uid, id: l.id, type: l.tipo, productName: l.produto_nome, quantity: Number(l.quantidade),
            date: l.data, note: l.observacao, totalValue: Number(l.valor_total),
            clientName: l.cliente_nome, paymentMethod: l.forma_pagamento, status: l.status,
            deliveryStatus: l.status_entrega, deliveredQty: Number(l.qtd_entregue),
            discount: Number(l.desconto), finStatus: l.status_financeiro, dueDate: l.vencimento,
            paidValue: Number(l.valor_pago), deliveryAddress: l.endereco_entrega
        }));

        const quotesMap = {};
        (resOrc.data || []).forEach(row => {
            const qId = String(row.id);
            if(!quotesMap[qId]) {
                quotesMap[qId] = { id: qId, date: row.data, clientName: row.cliente_nome, items: [], total: 0, status: row.status, discount: Number(row.desconto), discountType: row.tipo_desconto, paymentMethod: row.forma_pagamento, deliveryAddress: row.endereco_entrega };
            }
            quotesMap[qId].items.push({ name: row.item_nome, qty: Number(row.quantidade), price: Number(row.preco_unitario), total: Number(row.total_item) });
            quotesMap[qId].total += Number(row.total_item);
        });
        STATE.quotes = Object.values(quotesMap);

        STATE.custoMaterialB10 = resConf.data ? Number(resConf.data.valor) : 0;

        renderEstoque();
        renderOrcamentos();
        preencherSelects();
        renderDashRegistros(); 
        renderListaRegistros(); 

      } catch (error) {
          console.error("Erro no Supabase:", error);
          alert("Erro ao carregar dados: " + error.message);
      } finally {
          if(loader) loader.classList.add('hidden');
      }
    }

    function showTab(tab) {
      ['estoque', 'vendas', 'producao', 'registros'].forEach(t => {
        document.getElementById('view-' + t).classList.add('hidden');
        document.getElementById('btn-' + t).classList.remove('active-tab');
      });
      document.getElementById('view-' + tab).classList.remove('hidden');
      document.getElementById('btn-' + tab).classList.add('active-tab');
    }

    function renderDashRegistros() {
        const monthInput = document.getElementById('dash-month-filter');
        if (!monthInput.value) {
            const dataAtual = new Date();
            const y = dataAtual.getFullYear();
            const m = String(dataAtual.getMonth() + 1).padStart(2, '0');
            monthInput.value = `${y}-${m}`;
        }

        const mesSelecionado = monthInput.value;
        let totalMes = 0;

        (STATE.logs || []).forEach(log => {
            if(log.type === 'fabricacao' && log.status !== 'CANCELADO' && log.date) {
                const dObj = new Date(log.date);
                const logMesStr = `${dObj.getFullYear()}-${String(dObj.getMonth()+1).padStart(2,'0')}`;
                const qtd = Number(log.quantity) || 0;
                if(logMesStr === mesSelecionado) { totalMes += qtd; }
            }
        });

        document.getElementById('dash-mes').innerText = totalMes;
        const custoUn = Number(STATE.custoMaterialB10) || 0;
        document.getElementById('dash-custo-un').innerText = custoUn.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function limparFiltrosRegistros() {
        document.getElementById('reg-start').value = '';
        document.getElementById('reg-end').value = '';
        renderListaRegistros();
    }

    function renderListaRegistros() {
        const start = document.getElementById('reg-start')?.value;
        const end = document.getElementById('reg-end')?.value;
        
        let logs = (STATE.logs || [])
            .filter(l => l.type === 'fabricacao' && l.status !== 'CANCELADO')
            .sort((a,b) => new Date(b.date) - new Date(a.date));

        if(start) logs = logs.filter(l => new Date(l.date).toLocaleDateString('en-CA') >= start);
        if(end) logs = logs.filter(l => new Date(l.date).toLocaleDateString('en-CA') <= end);

        const listEl = document.getElementById('lista-registros');
        if(logs.length === 0) {
            listEl.innerHTML = '<div class="bg-white p-6 rounded-2xl border border-slate-100 text-center"><p class="text-slate-400 text-xs font-bold uppercase">Nenhum registro encontrado</p></div>';
            return;
        }

        listEl.innerHTML = logs.map(l => {
            const dataFormatada = new Date(l.date).toLocaleDateString('pt-BR');
            return `
            <div class="bg-white p-4 rounded-2xl border-2 border-slate-50 shadow-sm flex justify-between items-center">
                <div>
                    <p class="font-black text-slate-800 text-sm leading-tight">${l.productName}</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-wider">${dataFormatada} ${l.note ? '• ' + l.note : ''}</p>
                </div>
                <div class="font-black text-rv-orange text-xl bg-orange-50 px-3 py-1 rounded-xl">+${l.quantity}</div>
            </div>`;
        }).join('');
    }

    function renderEstoque() {
      // A MÁGICA: Pega os produtos e ordena pelo ID (do menor para o maior)
      const sortedProducts = (STATE.products||[]).slice().sort((a, b) => Number(a.id) - Number(b.id));

      document.getElementById('lista-estoque').innerHTML = sortedProducts.map(p => `
        <div class="bg-white p-5 rounded-2xl border-2 border-white shadow-sm flex justify-between items-center">
          <div><h4 class="font-black text-slate-800 leading-none">${p.name}</h4><p class="text-[9px] text-slate-400 uppercase font-bold mt-1">${p.category}</p></div>
          <div class="flex gap-4 text-right">
            <div><p class="text-[8px] text-slate-300 font-bold uppercase">Físico</p><p class="font-black text-slate-700 text-lg">${p.stock}</p></div>
            <div><p class="text-[8px] text-slate-300 font-bold uppercase">Disponível</p><p class="font-black text-lg ${p.available < 100 ? 'text-red-500' : 'text-blue-600'}">${p.available}</p></div>
          </div>
        </div>`).join('');
    }

    function renderOrcamentos() {
      document.getElementById('lista-orcamentos').innerHTML = STATE.quotes.slice().reverse().map(q => `
        <div class="bg-white p-5 rounded-2xl border-2 border-white flex justify-between items-center shadow-sm active:bg-orange-50">
          <div onclick="editarOrcamento('${q.id}')" class="flex-1">
            <h4 class="font-black text-slate-800">${q.clientName}</h4>
            <p class="text-[10px] text-slate-400 font-bold uppercase">${new Date(q.date).toLocaleDateString('pt-BR')} • #${q.id}</p>
          </div>
          <div class="flex items-center gap-2">
            <p class="font-black text-rv-orange text-base mr-2">R$ ${(q.total - (q.discount || 0)).toFixed(2)}</p>
            <button onclick="compartilharPDF('${q.id}')" class="w-10 h-10 border-rv-orange text-white rounded-xl flex items-center justify-center text-lg shadow-lg border border-blue-700">📲</button>
            <button onclick="gerarImpressao('${q.id}')" class="w-10 h-10 bg-rv-dark text-rv-orange rounded-xl flex items-center justify-center text-lg shadow-lg border border-rv-orange/30">🖨️</button>
          </div>
        </div>`).join('');
    }

    function preencherSelects() {
      const prods = STATE.products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
      const clis = STATE.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      document.getElementById('prod-select').innerHTML = '<option value="">Escolha o Produto...</option>' + prods;
      document.getElementById('orc-cliente').innerHTML = '<option value="">Selecione o Cliente...</option>' + clis;
      document.getElementById('orc-produto').innerHTML = '<option value="">Adicionar Produto...</option>' + prods;
    }

    function setarPrecoPadrao(id) {
      const p = STATE.products.find(x => x.id == id);
      if(p) document.getElementById('orc-preco').value = p.price;
    }

    function abrirFormOrcamento() {
      CURRENT_QUOTE_ID = null; CART = [];
      document.getElementById('modal-title').innerText = "Novo Orçamento";
      document.getElementById('orc-cliente').value = "";
      document.getElementById('orc-desc-val').value = 0;
      document.getElementById('orc-pagamento').value = "Dinheiro";
      renderCarrinho();
      document.getElementById('modal-orcamento').classList.remove('hidden');
    }

    function editarOrcamento(id) {
      const q = STATE.quotes.find(x => x.id == id);
      if(!q) return;
      CURRENT_QUOTE_ID = q.id; CART = [...q.items];
      document.getElementById('modal-title').innerText = "Editando Orçamento";
      const cli = STATE.clients.find(c => String(c.name).trim() === String(q.clientName).trim());
      document.getElementById('orc-cliente').value = cli ? cli.id : "";
      document.getElementById('orc-desc-val').value = q.discount || 0;
      document.getElementById('orc-desc-tipo').value = q.discountType || '$';
      document.getElementById('orc-pagamento').value = q.paymentMethod || 'Dinheiro';
      renderCarrinho();
      document.getElementById('modal-orcamento').classList.remove('hidden');
    }

    function addItemCarrinho() {
      const id = document.getElementById('orc-produto').value;
      const qtd = parseFloat(document.getElementById('orc-qtd').value);
      const preco = parseFloat(document.getElementById('orc-preco').value);
      if(!id || !qtd || isNaN(qtd)) return;
      const p = STATE.products.find(x => x.id == id);
      CART.push({ prodId: p.id, name: p.name, qty: qtd, price: preco, total: qtd * preco });
      document.getElementById('orc-qtd').value = "";
      renderCarrinho();
    }

    function renderCarrinho() {
      const box = document.getElementById('carrinho-itens');
      box.innerHTML = CART.map((item, idx) => `
        <div class="flex justify-between items-center p-3 bg-white border-2 border-slate-50 rounded-xl shadow-sm">
          <div class="flex-1">
            <p class="font-black text-slate-800 leading-none">${item.name}</p>
            <p class="text-[9px] text-slate-400 font-bold mt-1">${item.qty} un x R$ ${item.price.toFixed(2)}</p>
          </div>
          <div class="flex items-center gap-3">
            <span class="font-black text-slate-700">R$ ${item.total.toFixed(2)}</span>
            <button onclick="CART.splice(${idx},1);renderCarrinho()" class="text-red-500 font-bold p-2 text-lg">✕</button>
          </div>
        </div>`).join('');
      const subtotal = CART.reduce((a,b) => a + b.total, 0);
      const dVal = parseFloat(document.getElementById('orc-desc-val').value) || 0;
      const dTipo = document.getElementById('orc-desc-tipo').value;
      const desconto = dTipo === '%' ? (subtotal * (dVal/100)) : dVal;
      document.getElementById('orc-total-final').innerText = 'R$ ' + (subtotal - desconto).toFixed(2);
    }

    // --- SALVAR ORÇAMENTO NO SUPABASE ---
    async function enviarOrcamento() {
      if(!CART.length) return;
      const cliId = document.getElementById('orc-cliente').value;
      const clientName = STATE.clients.find(c => String(c.id) === String(cliId))?.name || "Consumidor Final";
      const subtotal = CART.reduce((a,b) => a + b.total, 0);
      
      document.getElementById('main-loader').classList.remove('hidden');

      try {
          const budgetId = CURRENT_QUOTE_ID || getNextId(STATE.quotes);
          const date = new Date().toISOString();
          const discount = parseFloat(document.getElementById('orc-desc-val').value) || 0;
          const discountType = document.getElementById('orc-desc-tipo').value;
          const paymentMethod = document.getElementById('orc-pagamento').value;

          // Remove orcamento antigo se for edição
          if(CURRENT_QUOTE_ID) {
              await sb.from('orcamentos').delete().eq('id', CURRENT_QUOTE_ID);
          }

          let quotesToInsert = CART.map(item => ({
              id: budgetId, data: date, cliente_nome: clientName, item_nome: item.name,
              quantidade: item.qty, preco_unitario: item.price, total_item: item.total,
              status: 'ABERTO', desconto: discount, tipo_desconto: discountType,
              forma_pagamento: paymentMethod, endereco_entrega: '' 
          }));

          const { error } = await sb.from('orcamentos').insert(quotesToInsert);
          if (error) throw error;

          fecharFormOrcamento(); 
          await loadData();
      } catch (error) {
          alert("Erro ao salvar: " + error.message);
          document.getElementById('main-loader').classList.add('hidden');
      }
    }

    function fecharFormOrcamento() { document.getElementById('modal-orcamento').classList.add('hidden'); }

    // --- NOVA FUNÇÃO: GERAR PDF (COM LOGO CENTRALIZADO NO MEIO DA FOLHA) ---
    function compartilharPDF(id) {

    // --- SALVAR PRODUÇÃO NO SUPABASE ---
    async function salvarProducao() {
      const pId = document.getElementById('prod-select').value;
      const qtyStr = document.getElementById('prod-qty').value;
      const qty = parseFloat(qtyStr);
      
      if(!pId || !qtyStr || isNaN(qty) || qty <= 0) {
        alert("Selecione o produto e informe uma quantidade válida!");
        return;
      }

      const prod = STATE.products.find(x => String(x.id) === String(pId));
      if (!prod) return;
      
      document.getElementById('main-loader').classList.remove('hidden');

      try {
          // 1. Atualiza Estoque Físico
          const { error: errProd } = await sb.from('produtos')
              .update({ estoque_fisico: prod.stock + qty })
              .eq('id', prod.id);
          
          if (errProd) throw errProd;

          // 2. Salva o Log de fabricação
          const novoId = getNextId(STATE.logs).toString();
          
          const entry = { 
            id: novoId, 
            tipo: 'fabricacao', 
            produto_nome: prod.name, 
            quantidade: qty, 
            data: new Date().toISOString(), 
            observacao: document.getElementById('prod-note').value,
            status: 'ATIVO'
          };

          const { error: errLog } = await sb.from('logs').insert([entry]);
          if (errLog) throw errLog;

          document.getElementById('prod-qty').value = ""; 
          document.getElementById('prod-note').value = "";
          
          alert("Produção lançada com sucesso! ID #" + novoId);
          await loadData();
          showTab('estoque');

      } catch (error) {
          alert("Erro ao salvar produção: " + error.message);
          document.getElementById('main-loader').classList.add('hidden');
      }
    }
  </script>
